<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            background-color: #2c2c2c;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
            max-width: 800px;
            width: 90%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ff6f61;
        }
        p {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        .details {
            background-color: #3c3c3c;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            overflow-x: auto;
            text-align: left;
        }
        .details pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: Consolas, monospace;
            font-size: 14px;
            color: #f0f0f0;
        }
        a {
            color: #1e90ff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }
        a:hover {
            color: #1c86ee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>An Error Occurred</h1>
        <p><strong>Error Message:</strong> {{ error }}</p>
        <p><strong>Error Type:</strong> {{ error_type }}</p>
        <p><strong>Location:</strong> {{ error_location }}</p>
        <div class="details">
            <h2>Stack Trace:</h2>
            <pre>{{ stack_trace }}</pre>
        </div>
        <p><a href="{{ url_for('index') }}">Go back to the Home Page</a></p>
    </div>
</body>
</html>
